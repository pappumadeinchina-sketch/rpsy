<!DOCTYPE html>
<html>
<head>
<title>Rock Paper Scissors GOD MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
  color: white;
  overflow-x: hidden;
}

/* CENTER */
.container {
  margin-top: 6vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* 🔥 SCOREBOARD (NO BOX) */
.score-box {
  display: flex;
  align-items: center;
  gap: 50px;
  padding: 10px 0;
  background: none;
  box-shadow: none;
  border-radius: 0;
}

/* GLOW DIVIDER */
.divider {
  width: 3px;
  height: 70px;
  background: linear-gradient(180deg, transparent, #00e0ff, #00ffd5, transparent);
  animation: glow 2s infinite;
}

@keyframes glow {
  50% { box-shadow: 0 0 12px #00ffd5; }
}

/* SCORE TEXT */
.player span, .ai span {
  font-size: 52px;
  font-weight: 700;
  text-shadow: 0 0 12px rgba(0,255,255,0.5);
}

.player p, .ai p {
  margin: 5px 0 0;
  opacity: 0.8;
  letter-spacing: 1px;
}

/* BUTTON AREA */
.btn-group {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  margin-top: 25px;
}

/* GLASS BUTTONS */
.btn {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 24px;
  margin: 10px;
  font-size: 18px;
  border-radius: 16px;
  border: none;
  cursor: pointer;
  backdrop-filter: blur(12px);
  background: rgba(255,255,255,0.12);
  color: white;
  transition: all 0.25s ease;
}

.btn:hover {
  transform: scale(1.12);
  box-shadow: 0 0 18px #00e0ff;
}

.emoji {
  font-size: 24px;
}

/* RESULT */
#result {
  font-size: 26px;
  margin-top: 15px;
  font-weight: 600;
}

/* ROUND */
#round {
  margin-top: 15px;
  font-size: 20px;
  opacity: 0.9;
}

/* 💀 LOSE OVERLAY */
.loseOverlay {
  position: fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background: rgba(255,0,0,0.25);
  pointer-events: none;
  animation: fadeOut 0.25s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; }
}

/* 🎉 CONFETTI */
.confetti {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  pointer-events: none;
}

/* RESTART BUTTON */
.restart-btn {
  background: #ff4d6d;
  color: white;
  padding: 12px 22px;
  border-radius: 14px;
  margin-top: 20px;
  border: none;
  font-size: 16px;
  transition: 0.2s;
}

.restart-btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 15px #ff4d6d;
}

.hidden { display: none; }

/* COPYRIGHT LOCK */
#copyright {
  margin-top: 80px;
  opacity: 0.7;
  user-select: none;
  cursor: default;
}
</style>
</head>

<body>

<div class="container">

<h1>🤖 Rock Paper Scissors</h1>

<div class="score-box">
  <div class="player">
    <span id="playerScore">0</span>
    <p>YOU</p>
  </div>

  <div class="divider"></div>

  <div class="ai">
    <span id="aiScore">0</span>
    <p>AI</p>
  </div>
</div>

<h3 id="round"></h3>

<div class="btn-group">
  <button class="btn" onclick="play('rock')"><span class="emoji">✊</span> Rock</button>
  <button class="btn" onclick="play('paper')"><span class="emoji">✋</span> Paper</button>
  <button class="btn" onclick="play('scissors')"><span class="emoji">✌️</span> Scissors</button>
</div>

<div id="result"></div>

<button id="restartBtn" class="restart-btn hidden" onclick="restart()">Play Again</button>

</div>

<footer id="copyright">© Garvit 2026</footer>

<script>
let round = 1, playerScore = 0, aiScore = 0, gameOver = false;
let cheatActive = false, tapCount = 0;

/* SECRET CHEAT */
document.getElementById("copyright").addEventListener("click", () => {
  tapCount++;
  if (tapCount === 3) {
    cheatActive = true;
    tapCount = 0;
  }
});

/* BLOCK RIGHT CLICK */
document.addEventListener("contextmenu", e => e.preventDefault());

const winMap = {
  rock: "scissors",
  paper: "rock",
  scissors: "paper"
};

updateDisplay();

function play(userChoice) {
  if (gameOver) return;

  let aiChoice = cheatActive
    ? winMap[userChoice]
    : (Math.random() < 0.5 ? winMap[userChoice] : counterMove(userChoice));

  if (winMap[userChoice] === aiChoice) {
    playerScore++;
    showResult("🎉 YOU WIN");
    confettiExplosion();
  } else {
    aiScore++;
    showResult("💀 AI WINS");
    loseEffect();
  }

  round++;
  updateDisplay();

  if (round > 5) finalResult();
}

function showResult(text) {
  document.getElementById("result").innerText = text;
}

/* 🎉 REAL CONFETTI EXPLOSION */
function confettiExplosion() {
  for (let i = 0; i < 30; i++) {
    let div = document.createElement("div");
    div.className = "confetti";
    div.style.left = "50%";
    div.style.top = "50%";
    div.style.background = `hsl(${Math.random()*360},100%,50%)`;

    let angle = Math.random() * 2 * Math.PI;
    let distance = Math.random() * 300;

    div.animate([
      { transform: "translate(0,0)" },
      { transform: `translate(${Math.cos(angle)*distance}px, ${Math.sin(angle)*distance}px)` }
    ], {
      duration: 600,
      easing: "ease-out"
    });

    document.body.appendChild(div);
    setTimeout(() => div.remove(), 600);
  }
}

/* 💀 LOSE EFFECT */
function loseEffect() {
  let overlay = document.createElement("div");
  overlay.className = "loseOverlay";
  document.body.appendChild(overlay);
  setTimeout(() => overlay.remove(), 250);

  if (navigator.vibrate) navigator.vibrate(100);
}

function finalResult() {
  gameOver = true;

  let text = playerScore > aiScore
    ? `🏆 YOU WON (${playerScore}/${aiScore})`
    : `💀 AI WON (${aiScore}/${playerScore})`;

  document.getElementById("result").innerText = text;
  document.getElementById("restartBtn").classList.remove("hidden");

  cheatActive = false;
}

function restart() {
  playerScore = 0;
  aiScore = 0;
  round = 1;
  gameOver = false;

  document.getElementById("restartBtn").classList.add("hidden");
  document.getElementById("result").innerText = "";

  updateDisplay();
}

function counterMove(move) {
  if (move === "rock") return "paper";
  if (move === "paper") return "scissors";
  return "rock";
}

function updateDisplay() {
  document.getElementById("round").innerText = `Round ${Math.min(round,5)}/5`;
  document.getElementById("playerScore").innerText = playerScore;
  document.getElementById("aiScore").innerText = aiScore;
}
</script>

</body>
</html>
