<!DOCTYPE html>
<html>
<head>
<title>PLAY AI - RPS SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{
  user-select:none;
  -webkit-tap-highlight-color: transparent;
}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  color: #d7f9ff;
  overflow-x: hidden;
  min-height: 100vh;

  background: radial-gradient(circle at 20% 20%, #0a2a33, transparent 40%),
              radial-gradient(circle at 80% 80%, #081a22, transparent 40%),
              linear-gradient(135deg, #050b12, #07131d, #0a1c28);
}

/* GRID */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.06) 1px, transparent 1px);
  background-size:45px 45px;
  transform:perspective(900px) rotateX(60deg);
  animation:gridMove 8s linear infinite;
  z-index:0;
}
@keyframes gridMove {
  0% { transform: perspective(900px) rotateX(60deg) translateY(0); }
  100% { transform: perspective(900px) rotateX(60deg) translateY(200px); }
}

body::after {
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.7));
  z-index:1;
}

body::before,body::after{pointer-events:none;}

/* BG BUTTON */
#modeToggle {
  position: fixed;
  top: 15px;
  right: 15px;
  padding: 10px 18px;
  border-radius: 999px;
  border: 1px solid #00eaff;
  background: rgba(0, 0, 0, 0.35);
  color: #00eaff;
  cursor: pointer;
  z-index: 10;
}

body.potato #modeToggle {
  color: #ff4d4d;
  border-color: #ff4d4d;
  background: rgba(255, 0, 0, 0.15);
}

body.potato::before,
body.potato::after {
  display:none !important;
}
body.potato {
  background:#0b0f14 !important;
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  margin-top:4vh;
  padding:10px;
}

h1{
  font-size: clamp(28px,6vw,60px);
}

/* SCORE */
.score-box{
  display:flex;
  justify-content:center;
  align-items:center;
  gap: clamp(20px,6vw,80px);
}

.player span,.ai span{
  font-size: clamp(40px,10vw,80px);
}

.divider{
  width:3px;
  height: clamp(60px,12vw,100px);
  background:#00eaff;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{opacity:0.3;}
  50%{opacity:1;}
  100%{opacity:0.3;}
}

/* BUTTONS */
.btn{
  padding: clamp(14px,3vw,22px) clamp(25px,6vw,45px);
  margin: 10px;
  border-radius: 18px;
  border: 1px solid #00eaff;
  background: rgba(0,234,255,0.08);
  color:#bffaff;
  cursor:pointer;
  font-size: clamp(16px,4vw,20px);
}

.btn:hover{
  background:#00eaff;
  color:#001a22;
}

/* OVERLAY ANIMATION */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(6px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeIn 0.3s;
}
.overlay-text{
  font-size:clamp(24px,6vw,48px);
  color:#00eaff;
  animation:zoomIn 0.4s;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes zoomIn{from{transform:scale(0.7);}to{transform:scale(1);}}

/* RESTART FIXED */
#restartBtn{
  display:none;
  margin-top:30px;
  position: relative;
  left: 50%;
  transform: translateX(-50%);
  padding: clamp(14px,3vw,20px) clamp(30px,6vw,50px);
  font-size: clamp(14px,3vw,18px);
  border-radius: 20px;
  border: 1px solid #00eaff;
  background: rgba(0,234,255,0.1);
  color:#bffaff;
  cursor:pointer;
  transition: all 0.3s ease;
}
#restartBtn:hover{
  transform: translateX(-50%) scale(1.1);
  background:#00eaff;
  color:#001a22;
  box-shadow: 0 0 20px #00eaff;
}

/* FX */
.particle{
  position: fixed;
  width:8px;
  height:8px;
  left:50%;
  top:50%;
}
.loseFlash {
  position: fixed;
  inset: 0;
  background: rgba(255,0,0,0.35);
  animation: redFade 0.4s forwards;
}
@keyframes redFade { to { opacity: 0; } }
</style>
</head>

<body>

<button id="modeToggle">BG</button>

<div class="container">

<h1>ROCK PAPER SCISSORS AI</h1>

<div class="score-box">
  <div class="player">
    <span id="playerScore">0</span>
    <p>YOU</p>
  </div>

  <div class="divider"></div>

  <div class="ai">
    <span id="aiScore">0</span>
    <p>AI</p>
  </div>
</div>

<div>
  <button class="btn" onclick="play()">✊ Rock</button>
  <button class="btn" onclick="play()">✋ Paper</button>
  <button class="btn" onclick="play()">✌ Scissors</button>
</div>

<button id="restartBtn" onclick="restart()">Restart</button>

</div>

<script>
let round=1,playerScore=0,aiScore=0,gameOver=false;
let cheat=false,potato=false;

const winMsgs=[
" U R LUCKY, NOT SKILLED 😎",
"Peak detaling by aditya dhar 🔥",
"LUCK LMAO 😂",
];

const loseMsgs=[
"sorry... not to u 😭",
"EZ LOL 😂",
"BRO AIN'T TOUGH 🥀",
"ARE YOU COMEDY 🤡",
"LMAOO 😂",
"EZZZZZZZ 😎",
"LOL SKILL ISSUE 😭",
"*bark* *bark* 🐶"
];

const playerScoreEl=document.getElementById("playerScore");
const aiScoreEl=document.getElementById("aiScore");
const restartBtn=document.getElementById("restartBtn");

/* BG */
modeToggle.onclick=()=>{
  potato=!potato;
  document.body.classList.toggle("potato",potato);
};

/* MESSAGE */
function showMsg(text){
  let o=document.createElement("div");
  o.className="overlay";
  o.innerHTML=`<div class="overlay-text">${text}</div>`;
  document.body.appendChild(o);
  setTimeout(()=>o.remove(),2500);
}

/* FLEXIBLE Z DETECTION */
function detectZ(points){
  if(points.length<10) return false;

  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  points.forEach(p=>{
    minX=Math.min(minX,p.x);
    maxX=Math.max(maxX,p.x);
    minY=Math.min(minY,p.y);
    maxY=Math.max(maxY,p.y);
  });

  let w=maxX-minX,h=maxY-minY;
  if(w<40||h<40) return false;

  let p1=points.slice(0,points.length/3);
  let p2=points.slice(points.length/3,2*points.length/3);
  let p3=points.slice(2*points.length/3);

  function dir(p){
    let dx=0,dy=0;
    for(let i=1;i<p.length;i++){
      dx+=p[i].x-p[i-1].x;
      dy+=p[i].y-p[i-1].y;
    }
    return {dx,dy};
  }

  let d1=dir(p1),d2=dir(p2),d3=dir(p3);

  return (d1.dx>15 && d2.dx<-10 && d2.dy>10 && d3.dx>15);
}

/* TOUCH */
let tpts=[],ttrack=false;
document.addEventListener("touchstart",e=>{
  if(e.touches.length===1){tpts=[];ttrack=true;}
});
document.addEventListener("touchmove",e=>{
  if(!ttrack)return;
  let t=e.touches[0];
  tpts.push({x:t.clientX,y:t.clientY});
});
document.addEventListener("touchend",()=>{
  if(ttrack && detectZ(tpts)) cheat=true;
  ttrack=false;
});

/* MOUSE */
let mpts=[],mtrack=false;
document.addEventListener("mousedown",()=>{mpts=[];mtrack=true;});
document.addEventListener("mousemove",e=>{
  if(!mtrack)return;
  mpts.push({x:e.clientX,y:e.clientY});
});
document.addEventListener("mouseup",()=>{
  if(mtrack && detectZ(mpts)) cheat=true;
  mtrack=false;
});

/* GAME */
function play(){
  if(gameOver)return;

  if(cheat){
    playerScore++;
    winParticles();
  } else {
    Math.random()<0.65 ? (aiScore++,loseParticles(),redFlash())
                       : (playerScore++,winParticles());
  }

  round++;
  update();
  if(round>5) end();
}

function update(){
  playerScoreEl.innerText=playerScore;
  aiScoreEl.innerText=aiScore;
}

function end(){
  gameOver=true;

  let msg;
  if(cheat){
    msg="Losing doesn’t feel that bad when it’s you.";
  } else if(playerScore>aiScore){
    msg=winMsgs[Math.floor(Math.random()*winMsgs.length)];
  } else {
    msg=loseMsgs[Math.floor(Math.random()*loseMsgs.length)];
  }

  showMsg(msg);
  restartBtn.style.display="block";
}

function restart(){
  round=1;playerScore=0;aiScore=0;gameOver=false;cheat=false;
  update();
  restartBtn.style.display="none";
}

/* FX */
function winParticles(){
  for(let i=0;i<15;i++){
    let p=document.createElement("div");
    p.className="particle";
    document.body.appendChild(p);
    let a=Math.random()*6.28,d=200;
    p.style.background=`hsl(${Math.random()*360},100%,50%)`;
    p.animate([{transform:"translate(0,0)"},{transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`}],{duration:600});
    setTimeout(()=>p.remove(),600);
  }
}
function loseParticles(){
  for(let i=0;i<10;i++){
    let p=document.createElement("div");
    p.className="particle";
    document.body.appendChild(p);
    let a=Math.random()*6.28,d=150;
    p.style.background="red";
    p.animate([{transform:"translate(0,0)"},{transform:`translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`}],{duration:500});
    setTimeout(()=>p.remove(),500);
  }
}
function redFlash(){
  let d=document.createElement("div");
  d.className="loseFlash";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),300);
}

update();
</script>

</body>
</html>
