<!DOCTYPE html>
<html>
<head>
<title>PLAY AI - RPS SYSTEM</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{user-select:none;}

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  text-align: center;
  color: #d7f9ff;
  overflow-x: hidden;
  min-height: 100vh;

  background: radial-gradient(circle at 20% 20%, #0a2a33, transparent 40%),
              radial-gradient(circle at 80% 80%, #081a22, transparent 40%),
              linear-gradient(135deg, #050b12, #07131d, #0a1c28);
}

/* MOVING GRID */
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(rgba(0,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,255,255,0.06) 1px, transparent 1px);
  background-size:45px 45px;
  transform:perspective(900px) rotateX(60deg);
  animation:gridMove 8s linear infinite;
  z-index:0;
}

@keyframes gridMove {
  0% { transform: perspective(900px) rotateX(60deg) translateY(0); }
  100% { transform: perspective(900px) rotateX(60deg) translateY(200px); }
}

body::after {
  content:"";
  position:fixed;
  inset:0;
  background: radial-gradient(circle, transparent 30%, rgba(0,0,0,0.7));
  z-index:1;
}

/* ✅ FIX: allow clicks through background */
body::before,
body::after {
  pointer-events: none;
}

/* LITE MODE */
body.potato::before,
body.potato::after {
  display:none !important;
}
body.potato {
  background:#0b0f14 !important;
}

/* LITE BUTTON */
#modeToggle {
  position: fixed;
  top: 15px;
  right: 15px;
  padding: 10px 18px;
  border-radius: 999px;

  border: 1px solid #00eaff;
  background: rgba(0, 0, 0, 0.35);
  color: #00eaff;

  cursor: pointer;
  z-index: 10;
  transition: all 0.25s ease;
}

/* 🔴 ACTIVE (LITE MODE ON) */
body.potato #modeToggle {
  color: #ff4d4d;
  border-color: #ff4d4d;
  background: rgba(255, 0, 0, 0.15);
  box-shadow: 0 0 12px rgba(255,0,0,0.6);
}

/* CONTAINER */
.container {
  position:relative;
  z-index:2;
  margin-top:5vh;
}

/* SCORE */
.score-box {
  display:flex;
  justify-content:center;
  align-items:center;
  gap:50px;
}

.player span,.ai span{
  font-size:60px;
}

/* DIVIDER ANIM */
.divider{
  width:3px;
  height:90px;
  background:#00eaff;
  animation:pulse 1.5s infinite;
}
@keyframes pulse{
  0%{opacity:0.3;}
  50%{opacity:1;}
  100%{opacity:0.3;}
}

/* BUTTONS */
.btn{
  padding: clamp(14px,3vw,20px) clamp(20px,5vw,30px);
  margin: 10px;
  border-radius: 16px;
  border: 1px solid #00eaff;
  background: rgba(0,234,255,0.08);
  color:#bffaff;
  cursor:pointer;
  font-size: clamp(14px,3vw,18px);
  transition: all 0.25s ease;
}

.btn:hover{
  background: #00eaff;
  color: #001a22;
  box-shadow: 0 0 15px #00eaff, 0 0 40px rgba(0,234,255,0.5);
  transform: scale(1.08);
}

* {
  -webkit-tap-highlight-color: transparent;
}

button, div, footer {
  outline: none;
  -webkit-focus-ring-color: transparent;
}
/* FULLSCREEN RESULT */
.overlay {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(6px);
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeIn 0.3s;
}
.overlay-text{
  font-size:clamp(24px,6vw,48px);
  color:#00eaff;
  animation:zoomIn 0.4s;
}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes zoomIn{from{transform:scale(0.7);}to{transform:scale(1);}}

/* RESTART */
#restartBtn{
  display:none;
  margin-top: 30px;

  position: relative;
  left: 50%;
  transform: translateX(-50%);

  padding: clamp(14px,3vw,20px) clamp(30px,6vw,50px);
  font-size: clamp(14px,3vw,18px);

  border-radius: 20px;
  border: 1px solid #00eaff;

  background: rgba(0,234,255,0.1);
  color:#bffaff;

  cursor:pointer;
  transition: all 0.3s ease;
}

#restartBtn:hover{
  transform: translateX(-50%) scale(1.1);
  background:#00eaff;
  color:#001a22;
  box-shadow: 0 0 20px #00eaff;
}

/* COPYRIGHT */
#copyright{
  margin-top:30px;
  cursor:default; /* remove button feel */
  position: relative;
  z-index: 9999;

  -webkit-tap-highlight-color: transparent; /* remove blue flash */
  user-select: none;

  pointer-events: auto;
}

h1{
  font-size: clamp(36px,7vw,70px);
}

.player span,.ai span{
  font-size: clamp(50px,10vw,80px);
}

.score-box{
  gap: clamp(30px,8vw,90px);
}

.particle{
  position: fixed;
  width:8px;
  height:8px;
  left:50%;
  top:50%;
  z-index:999;
}

.loseFlash {
  position: fixed;
  inset: 0;
  background: rgba(255,0,0,0.35);
  z-index: 999;
  animation: redFade 0.4s forwards;
}

@keyframes redFade {
  to { opacity: 0; }
}
</style>
</head>

<body>

<button id="modeToggle">BG</button>

<div class="container">

<h1>ROCK PAPER SCISSORS AI</h1>

<div class="score-box">
  <div class="player">
    <span id="playerScore">0</span>
    <p>YOU</p>
  </div>

  <div class="divider"></div>

  <div class="ai">
    <span id="aiScore">0</span>
    <p>AI</p>
  </div>
</div>

<div class="btn-group">
  <button class="btn" onclick="play('rock')">✊ Rock</button>
  <button class="btn" onclick="play('paper')">✋ Paper</button>
  <button class="btn" onclick="play('scissors')">✌ Scissors</button>
</div>

<button id="restartBtn" onclick="restart()">Restart</button>

</div>

<footer id="copyright">© Garvit 2026</footer>

<script>
let round=1,playerScore=0,aiScore=0,gameOver=false;
let cheat=false,taps=0,potato=false;

const winMap={rock:"scissors",paper:"rock",scissors:"paper"};

const winMsgs=[
" U R LUCKY, NOT SKILLED 😎",
"Peak detaling by aditya dhar 🔥",
"LUCK LMAO 😂",
];

const loseMsgs=[
"sorry... not to u 😭",
"EZ LOL 😂",
"BRO AIN'T TOUGH 🥀",
"ARE YOU COMEDY 🤡",
"LMAOO 😂",
"EZZZZZZZ 😎",
"LOL SKILL ISSUE 😭",
"*bark* *bark* 🐶"
];

/* LITE */
document.getElementById("modeToggle").onclick=()=>{
  potato=!potato;
  document.body.classList.toggle("potato",potato);
};

/* CHEAT (same logic, now works due to fix) */
document.getElementById("copyright").onclick=()=>{
  taps++;
  if(taps===3){
    cheat=true;
    taps=0;
  }
};

/* FULLSCREEN RESULT */
function showMsg(text){
  const o=document.createElement("div");
  o.className="overlay";
  o.innerHTML=`<div class="overlay-text">${text}</div>`;
  document.body.appendChild(o);
  setTimeout(()=>o.remove(),3000);
}

/* GAME */
function play(choice){
  if(gameOver)return;

  let ai;

  if(cheat){
    playerScore++;
    winParticles();
  } else {
const choices = ["rock","paper","scissors"];

let rand = Math.random();

if(rand < 0.65){
  // AI WINS (65%)
  if(choice === "rock") ai = "paper";
  else if(choice === "paper") ai = "scissors";
  else ai = "rock";

  aiScore++;
  loseParticles();
  redFlash();

} else {
  // PLAYER WINS (35%)
  if(choice === "rock") ai = "scissors";
  else if(choice === "paper") ai = "rock";
  else ai = "paper";

  playerScore++;
  winParticles();
}
  }

  round++;
  update();

  if(round>5) end();
}

function update(){
  playerScoreEl.innerText=playerScore;
  aiScoreEl.innerText=aiScore;
}

function end(){
  gameOver=true;

  let msg;

  if(cheat){
    msg="AI: Losing doesn’t feel that bad when it’s you.";
  } else if(playerScore>aiScore){
    msg=winMsgs[Math.floor(Math.random()*winMsgs.length)];
  } else {
    msg=loseMsgs[Math.floor(Math.random()*loseMsgs.length)];
  }

  showMsg(msg);
  document.getElementById("restartBtn").style.display="block";
}

function restart(){
  round=1;
  playerScore=0;
  aiScore=0;
  gameOver=false;
  cheat=false;
  taps=0;
  update();
  document.getElementById("restartBtn").style.display="none";
}

const playerScoreEl=document.getElementById("playerScore");
const aiScoreEl=document.getElementById("aiScore");

update();

function winParticles(){
  for(let i=0;i<25;i++){
    let p=document.createElement("div");
    p.className="particle";
    document.body.appendChild(p);

    let angle=Math.random()*Math.PI*2;
    let dist=200;

    p.style.background=`hsl(${Math.random()*360},100%,50%)`;

    p.animate([
      {transform:"translate(0,0)"},
      {transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`}
    ],{duration:700});

    setTimeout(()=>p.remove(),700);
  }
}

function loseParticles(){
  for(let i=0;i<20;i++){
    let p=document.createElement("div");
    p.className="particle";
    document.body.appendChild(p);

    let angle=Math.random()*Math.PI*2;
    let dist=150;

    p.style.background="red";

    p.animate([
      {transform:"translate(0,0)"},
      {transform:`translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px)`}
    ],{duration:600});

    setTimeout(()=>p.remove(),600);
  }
}

function redFlash(){
  let d=document.createElement("div");
  d.className="loseFlash";
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),400);
}

const music = document.getElementById("bgMusic");

/* try to unmute after short delay */
setTimeout(() => {
  music.muted = false;
  music.volume = 0.4;
  music.play().catch(()=>{});
}, 1000);

function goFullScreen(){
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(()=>{});
  }
}

/* trigger fullscreen on first interaction */
document.addEventListener("click", goFullScreen, { once: true });
</script>
<audio id="bgMusic" autoplay loop muted>
  <source src="https://downloads.khinsider.com/game-soundtracks/album/project-igi/Project%2520IGI%2520-%2520menu.mp3" type="audio/mp3">
</audio>
</body>
</html>
